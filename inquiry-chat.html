<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Capy-no お問い合わせチャット(プロトタイプ)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

:root{
  --bg: #F6EFE2;
  --card: #FFFFFF;
  --ink: #4A3428;
  --ink-soft: #8D7A67;
  --terracotta: #B2703F;
  --terracotta-dark: #8F5A30;
  --leather-mid: #886650;
  --leather-dark: #5A2722;
  --tan: #B4B886;
  --dashed: #DCCBA9;
  --chip-border: #E2D3B4;
  --online: #8DA43E;
}
*{box-sizing:border-box;}
html,body{height:100%; overscroll-behavior:none;}
body{
  margin:0;
  font-family:'Zen Maru Gothic', sans-serif;
  background:var(--bg);
  color:var(--ink);
  display:flex;
  justify-content:center;
  overflow:hidden;
}
.app-shell{
  width:100%;
  max-width:480px;
  height:100dvh;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
}

/* ---------- header (fixed) ---------- */
.page-head{
  flex-shrink:0;
  text-align:center;
  padding:16px 46px 10px;
  position:relative;
}
.head-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.logo-circle{
  width:32px;height:32px;
  border-radius:50%;
  background:linear-gradient(160deg, var(--terracotta) 0%, var(--leather-mid) 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  flex-shrink:0;
}
.page-title{
  font-size:17px;
  font-weight:900;
  color:var(--leather-dark);
  margin:0;
  line-height:1.3;
}
.page-sub{
  font-size:11.5px;
  color:var(--ink-soft);
  margin:5px 0 0;
}
/* ---------- chat card (fills remaining space) ---------- */
.chat-card{
  flex:1;
  min-height:0;
  margin:0 12px;
  background:var(--card);
  border:2px dashed var(--dashed);
  border-radius:22px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.staff-row{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:9px;
  padding:12px 14px;
  border-bottom:1px solid #F1E7D4;
  background:var(--card);
}
.staff-avatar{
  width:32px;height:32px;
  border-radius:50%;
  background:#F1E7D4;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  flex-shrink:0;
  padding:3px;
}
.staff-name{font-size:12.5px; font-weight:700; color:var(--leather-dark);}
.staff-status{font-size:10px; color:var(--ink-soft); margin-top:2px; display:flex; align-items:center; gap:5px;}
.dot{width:6px;height:6px; border-radius:50%; background:var(--online); flex-shrink:0;}
.avatar-img{width:100%; height:100%; object-fit:contain; border-radius:50%;}

.messages{
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:14px;
  -webkit-overflow-scrolling:touch;
}
.msg-row{display:flex; gap:7px; align-items:flex-end;}
.msg-row.user{justify-content:flex-end;}
.msg-avatar{
  width:23px;height:23px; border-radius:50%; flex-shrink:0;
  background:#F1E7D4; display:flex; align-items:center; justify-content:center;
  font-size:11px;
  padding:2px;
}
.bubble{
  max-width:80%;
  padding:9px 13px;
  border-radius:15px;
  font-size:13.5px;
  line-height:1.6;
  white-space:pre-wrap;
  word-break:break-word;
}
.msg-row.bot .bubble{
  background:#FBF6EC;
  color:var(--ink);
  border-top-left-radius:5px;
}
.msg-row.user .bubble{
  background:var(--terracotta);
  color:#fff;
  border-top-right-radius:5px;
}

.chips{display:flex; flex-wrap:wrap; gap:7px; padding-top:2px;}
.chip{
  border:1.3px solid var(--chip-border);
  background:#fff;
  color:var(--leather-dark);
  font-family:inherit;
  font-size:11.5px;
  font-weight:500;
  padding:7px 12px;
  border-radius:18px;
  cursor:pointer;
}
.chip:hover{background:#FBF3E4; border-color:var(--terracotta);}

.typing{display:flex; gap:4px; padding:4px 2px;}
.typing span{
  width:5px;height:5px;border-radius:50%;
  background:var(--online);
  animation:bounce 1.2s infinite ease-in-out;
}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}

/* ---------- input row (fixed) ---------- */
.input-row{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 12px 4px;
}
.input-pill{
  flex:1;
  display:flex;
  align-items:center;
  background:#fff;
  border:1.5px solid var(--chip-border);
  border-radius:24px;
  padding:3px 5px 3px 16px;
}
.input-pill textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:transparent;
  font-family:inherit;
  font-size:13.5px;
  color:var(--ink);
  max-height:60px;
  padding:8px 4px;
  line-height:1.4;
}
.input-pill textarea::placeholder{color:#C4B49C;}
.send-btn{
  background:var(--terracotta);
  border:none;
  color:#fff;
  width:36px;height:36px;
  border-radius:50%;
  flex-shrink:0;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.send-btn:disabled{opacity:.4; cursor:default;}
.send-btn:hover:not(:disabled){background:var(--terracotta-dark);}

/* ---------- disclaimer (fixed) ---------- */
.disclaimer{
  flex-shrink:0;
  text-align:center;
  font-size:10px;
  font-weight:700;
  color:#A34A3A;
  padding:6px 16px 12px;
  line-height:1.5;
}
.disclaimer a{color:var(--terracotta-dark);}

</style>
</head>

const DEFAULT_FAQ = [
  {q:"注文してから届くまでどのくらいかかりますか？", a:"お届けは注文確定から2週間程度となります。\nお住いの地域によってはさらに数日程度かかる場合がございます。\n\nご注文いただいてから順番に製作しておりますので、長めのお時間をいただいております。\nお待ちいただけますと幸いです。\n\nお急ぎの場合は公式LINEより直接ご相談ください"},
  {q:"送料はいくらですか？", a:"全国一律 無料で対応しています。"},
  {q:"ギフトラッピングはできますか？", a:"無料でラッピングを受け付けております。\n商品をカートに入れる際にラッピングの有無を選択してください。"},
  {q:"注文後のキャンセルはできますか？", a:"発送前であればキャンセル可能です。\nお問い合わせフォームより「キャンセル希望」とご連絡ください。\n\nただし、「銀行振込」または「コンビニ（Pay-easy）決済」の場合は、一度注文を確定した後に返金手続きを行います。\n※注文日から5日(または5営業日)以内に入金がない場合、自動キャンセルとなります。"},
  {q:"返品はできますか？", a:"お手元に届いてから1週間以内であれば返品を受け付けております。\n以下の注意事項をご確認の上、お問い合わせフォームよりご連絡ください。\n\n注意事項\n・商品に欠陥があり、未使用の場合にのみ対応いたします。\n・お届け時に同梱していたものもすべてお戻しください。\n・不良部分確認のため写真確認する場合がございます。"},
  {q:"どの色を選べばいいか迷っています。\n色の相談にのってもらうことはできますか？\nバイカラーの相談はできますか？", a:"はい、できます。\n公式LINEでお気軽にご相談ください。"},
  {q:"カピバラデザインの刻印をせずに作ってもらうことはできますか？", a:"もちろんできます。\n購入手続きの際、備考欄に「カピバラ刻印なし希望」と記載してください。"},
  {q:"売り切れている商品は再販されますか？", a:"定番アイテムは再販できます。\nただし、期間限定アイテムは再販できない場合があります。\n購入検討中の商品が売り切れの場合は、お問い合わせフォームまたは公式LINEからご連絡ください"},
  {q:"過去に販売していた商品は注文できますか？", a:"革や金具などの材料があればお作りできます。\nオーダーメイド対応となりますので、公式LINEからご相談ください。"},
  {q:"写真と実物の色は同じですか？", a:"天然素材である牛革を使っているため、色ブレや個体特有の傷やシワがあります。\n色だけではなく革の表情も同じものがない一点ものとなります。"},
  {q:"汚れが目立ちにくい色はどれですか？", a:"汚れが目立ちにくいのはブラックやダークブラウンです。\n植物タンニン鞣しの本革で仕立てておりますので、水濡れにもご注意ください。"},
  {q:"植物タンニン鞣しってなんですか？", a:"植物タンニン鞣し革は、植物から抽出した成分を使って仕上げた革です。\n使い込むほど色つやが深まり、手になじんでいく経年変化を楽しめるのが魅力です。革らしい自然な風合いや香りも感じられます。\n一方で、水濡れや日焼けによるシミ・色の変化が起こりやすく、傷もつきやすい素材です。購入時の状態を長く保つ革というより、変化も含めて育てながら楽しむ革です。"},
  {q:"経年変化(エイジング)とは何ですか？", a:"経年変化（エイジング）とは、革を使ううちに色やつや、手触りが少しずつ変わっていくことです。\n手の油分や摩擦、日光などの影響によって色が深まり、つやが出て、自分だけの風合いに育っていくのが魅力です。\n一方で、使い方や保管環境によって変化の仕方には差があり、色むらや小さな傷も残ります。購入時の色や状態を保つものではなく、変化も革の個性としてお楽しみください。"},
  {q:"限定アイテムはいつまで購入できますか？", a:"革の在庫状況によって変わりますので、公式LINEからお問い合わせください。"},
  {q:"別の商品を同じ色でそろえることはできますか？", a:"はい、できます。\nただし、天然素材である牛革を使っているため、色ブレや個体特有のシワなどによって、まったく同じ革の表情ではないことをご了承いただけますと幸いです。"},
  {q:"カピバラデザインは選べますか？\nカピバラデザインを変更することはできますか？", a:"定番アイテムに刻印しているカピバラデザインは変更することができます。\n刻印カスタマイズご案内ページ(https://capyno.official.ec/p/00017)をご確認ください"},
  {q:"カピバラ刻印を追加することはできますか？\n1つの商品に複数のカピバラ刻印を入れてもらうことはできますか？", a:"もちろんできます。\n刻印できるスペースがあれば、いくつでも無料でカピバラ刻印追加できます。\n\nただし、カピバラデザインのサイズは大きいものから小さいものまでいろいろございます。\nどんな刻印があるのかは、刻印カスタマイズご案内ページ(https://capyno.official.ec/p/00017)をご確認ください。\n\nご希望の場所に追加できるのか不安な方は、公式LINEから直接お問い合わせください。"},
  {q:"刻印する位置は変更できますか？", a:"刻印サイズが収まるスペースがあれば変更可能です。\n購入手続きの際、備考欄に変更したい位置を記入してください。\nご希望の場所に位置変更できるのか不安な方は、公式LINEから直接お問い合わせください。"},
  {q:"表側ではなく裏側にカピバラ刻印を移動できますか？\nカピバラ刻印を目立たない位置に入れることはできますか？", a:"刻印できるスペースがあれば、目立たない位置や内側にもカピバラ刻印を入れることができます\nどの位置に入れたいかご希望はありますか？\n公式LINEから直接メッセージで教えてください。"},
  {q:"定番商品のカピバラ刻印を期間限定のカピバラ刻印に変更することはできますか？", a:"限定刻印販売中であれば変更希望を受け付けております。\nただし、「サンタカピバラ」などの期間限定刻印など、販売期間中でないときはご注文を受け付けておりません。"},
  {q:"カピバラ刻印が革によって見えにくくなることはありますか？\nブラックの革はカピバラ刻印が見えにくいですか？", a:"カピバラ刻印は、革に強い圧力をかけることで模様を入れています。\nブラックやダークブラウンなどの暗い色の場合は、凹凸による陰影が目立ちにくい場合があります。"},
  {q:"カピバラを大きく、または小さくできますか？", a:"カピバラ刻印の大きさは変更できません。\n刻印デザインは大きいものから小さいものまで幅広くご用意していますので、定番アイテムで刻印しているカピバラから変更することは可能です。\n刻印カスタマイズご案内ページ(https://capyno.official.ec/p/00017)からカピバラ刻印の大きさをご確認いただけます。"},
  {q:"オリジナルイラストを刻印できますか？", a:"こちらでご用意しているカピバラデザインのみ刻印できます。\nいろんなデザインをご用意していますので、刻印カスタマイズご案内ページ(https://capyno.official.ec/p/00017)を見て見てください。"}
];

- 想定問答集に無い情報は絶対に作り出さないでください。
- 該当する項目が見つからない場合は、丁寧に謝った上で、まずFAQページ(https://capyno.official.ec/p/00001)をご案内し、それでも解決しない場合は公式LINE(https://lin.ee/e5Dr0DT)から直接お問い合わせいただくようご案内してください。
- 口調は丁寧語ベースですが、堅苦しすぎず温かみのある大人向けの接客トーンにしてください。
- 返信は2〜4文程度、簡潔にまとめてください。
- 挨拶や前置きは不要で、本題から答えてください。`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{role: "user", content: userText}]
    })
  });
  if(!response.ok){
    throw new Error("API error: " + response.status);
  }
  const data = await response.json();
  const textBlock = (data.content || []).find(b => b.type === 'text');
  return textBlock ? textBlock.text : "申し訳ございません、うまく回答を作成できませんでした。";
}

async function handleSend(){
  const text = input.value.trim();
  if(!text || sending) return;
  sending = true;
  sendBtn.disabled = true;
  messages.push({role:'user', text});
  input.value = '';
  input.style.height = 'auto';
  renderMessages();
  showTyping();
  try{
    const reply = await callAI(text);
    hideTyping();
    messages.push({role:'bot', text: reply});
  }catch(e){
    hideTyping();
    messages.push({role:'bot', text: '通信エラーが発生しました。少し時間をおいて、もう一度お試しください。'});
  }
  renderMessages();
  sending = false;
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 60) + 'px';
});

/* ---------- init ---------- */
function init(){
  faq = DEFAULT_FAQ.slice();
  messages = [{role:'bot', text:'こんにちは、Capy-noの温泉カピバラです🦫\nご質問があればお気軽にどうぞ。よくあるご質問はこちらから選んでいただくこともできます。'}];
  renderMessages();
}
init();
