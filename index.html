<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Capy-no お問い合わせチャット</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LEYT636MM8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LEYT636MM8');
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

:root{
  --bg: #F6EFE2;
  --card: #FFFFFF;
  --ink: #4A3428;
  --ink-soft: #8D7A67;
  --terracotta: #B2703F;
  --terracotta-dark: #8F5A30;
  --leather-mid: #886650;
  --leather-dark: #5A2722;
  --tan: #B4B886;
  --dashed: #DCCBA9;
  --chip-border: #E2D3B4;
  --online: #8DA43E;
}
*{box-sizing:border-box;}
html,body{height:100%; overscroll-behavior:none;}
body{
  margin:0;
  font-family:'Zen Maru Gothic', sans-serif;
  background:var(--bg);
  color:var(--ink);
  display:flex;
  justify-content:center;
  overflow:hidden;
}
.app-shell{
  width:100%;
  max-width:480px;
  height:100dvh;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
}

/* ---------- header (fixed) ---------- */
.page-head{
  flex-shrink:0;
  text-align:center;
  padding:16px 46px 10px;
  position:relative;
}
.head-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.logo-circle{
  width:32px;height:32px;
  border-radius:50%;
  background:linear-gradient(160deg, var(--terracotta) 0%, var(--leather-mid) 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  flex-shrink:0;
}
.page-title{
  font-size:17px;
  font-weight:900;
  color:var(--leather-dark);
  margin:0;
  line-height:1.3;
}
.page-sub{
  font-size:11.5px;
  color:var(--ink-soft);
  margin:5px 0 20px;
}
/* ---------- chat card (70% of the available flexible space) ---------- */
.chat-card{
  flex:7 1 0%;
  min-height:0;
  margin:0 12px;
  background:var(--card);
  border:2px dashed var(--dashed);
  border-radius:22px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.chat-spacer{
  flex:3 1 0%;
  min-height:0;
}
.staff-row{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:9px;
  padding:12px 14px;
  border-bottom:1px solid #F1E7D4;
  background:var(--card);
}
.staff-avatar{
  width:32px;height:32px;
  border-radius:50%;
  background:#F1E7D4;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  flex-shrink:0;
  padding:3px;
}
.staff-name{font-size:12.5px; font-weight:700; color:var(--leather-dark);}
.staff-status{font-size:10px; color:var(--ink-soft); margin-top:2px; display:flex; align-items:center; gap:5px;}
.dot{width:6px;height:6px; border-radius:50%; background:var(--online); flex-shrink:0;}
.avatar-img{width:100%; height:100%; object-fit:contain; border-radius:50%;}

.messages{
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:14px;
  -webkit-overflow-scrolling:touch;
}
.msg-row{display:flex; gap:7px; align-items:flex-end;}
.msg-row.user{justify-content:flex-end;}
.msg-avatar{
  width:23px;height:23px; border-radius:50%; flex-shrink:0;
  background:#F1E7D4; display:flex; align-items:center; justify-content:center;
  font-size:11px;
  padding:2px;
}
.bubble{
  max-width:80%;
  padding:9px 13px;
  border-radius:15px;
  font-size:13.5px;
  line-height:1.6;
  white-space:pre-wrap;
  word-break:break-word;
}
.msg-row.bot .bubble{
  background:#FBF6EC;
  color:var(--ink);
  border-top-left-radius:5px;
}
.msg-row.user .bubble{
  background:var(--terracotta);
  color:#fff;
  border-top-right-radius:5px;
}

.chips{display:flex; flex-wrap:wrap; gap:7px; padding-top:2px;}
.chip{
  border:1.3px solid var(--chip-border);
  background:#fff;
  color:var(--leather-dark);
  font-family:inherit;
  font-size:11.5px;
  font-weight:500;
  padding:7px 12px;
  border-radius:18px;
  cursor:pointer;
}
.chip:hover{background:#FBF3E4; border-color:var(--terracotta);}

.resolve-check{display:flex; flex-direction:column; gap:6px; padding-top:2px;}
.resolve-check-text{font-size:11.5px; color:var(--ink-soft);}

.typing{display:flex; gap:4px; padding:4px 2px;}
.typing span{
  width:5px;height:5px;border-radius:50%;
  background:var(--online);
  animation:bounce 1.2s infinite ease-in-out;
}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-5px);opacity:1;}}

/* ---------- input row (fixed) ---------- */
.input-row{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 12px 4px;
}
.input-pill{
  flex:1;
  display:flex;
  align-items:center;
  background:#fff;
  border:1.5px solid var(--chip-border);
  border-radius:24px;
  padding:3px 5px 3px 16px;
}
.input-pill textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:transparent;
  font-family:inherit;
  font-size:13.5px;
  color:var(--ink);
  max-height:60px;
  padding:8px 4px;
  line-height:1.4;
}
.input-pill textarea::placeholder{color:#C4B49C;}
.send-btn{
  background:var(--terracotta);
  border:none;
  color:#fff;
  width:36px;height:36px;
  border-radius:50%;
  flex-shrink:0;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.send-btn:disabled{opacity:.4; cursor:default;}
.send-btn:hover:not(:disabled){background:var(--terracotta-dark);}

/* ---------- disclaimer (fixed) ---------- */
.disclaimer{
  flex-shrink:0;
  text-align:center;
  font-size:10px;
  font-weight:700;
  color:#A34A3A;
  padding:6px 16px 12px;
  line-height:1.5;
}
.disclaimer a{color:var(--terracotta-dark);}
.disclaimer-note{
  flex-shrink:0;
  text-align:center;
  font-size:9px;
  color:var(--ink-soft);
  padding:0 12px 10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

</style>
</head>
<body>

<div class="app-shell">
  <div class="page-head">
    <div class="head-row">
      <div class="page-title">ショップガイド専用チャット</div>
    </div>
    <div class="page-sub">お買い物でわからないことにチャットでお答えします</div>
  </div>

  <div class="chat-card">
    <div class="staff-row">
      <div class="staff-avatar"><img src="assets/character.png" alt="温泉カピバラ" class="avatar-img"></div>
      <div>
        <div class="staff-name">温泉カピバラ(Capy-no接客スタッフ)</div>
        <div class="staff-status">すぐに返信します</div>
      </div>
    </div>
    <div class="messages" id="chatArea"></div>
  </div>

  <div class="input-row">
    <div class="input-pill">
      <textarea id="input" rows="1" placeholder="例:送料について知りたいです"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" title="送信">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 11L21 3L13 21L11 13L3 11Z" fill="white"/></svg>
    </button>
  </div>
  <div class="disclaimer">
    <a href="https://capyno.official.ec/" target="_blank" rel="noopener">オンラインショップに戻る</a>
  </div>
  <div class="disclaimer-note">このチャットでは、登録された情報をもとにAIが自動でご案内します。</div>
  <div class="chat-spacer"></div>
</div>

<script>
let messages = [];
let sending = false;

const chatArea = document.getElementById('chatArea');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderText(str){
  const escaped = escapeHtml(str);
  return escaped.replace(/\[([^\[\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => `<a href="${url}" target="_blank" rel="noopener">${label}</a>`);
}

function renderMessages(){
  chatArea.innerHTML = '';
  chatArea.classList.toggle('is-initial', messages.length <= 1);
  messages.forEach(m => {
    const row = document.createElement('div');
    row.className = 'msg-row ' + m.role;
    if(m.role === 'bot'){
      row.innerHTML = `
        <div class="msg-avatar"><img src="assets/character.png" alt="温泉カピバラ" class="avatar-img"></div>
        <div class="bubble">${renderText(m.text)}</div>`;
    } else {
      row.innerHTML = `<div class="bubble">${renderText(m.text)}</div>`;
    }
    chatArea.appendChild(row);
  });
  if(messages.length <= 1){
    const chipWrap = document.createElement('div');
    chipWrap.className = 'chips';
    ["送料はいくらですか？","配送は何日くらい？","交換・返品について"].forEach(q=>{
      const c = document.createElement('button');
      c.className = 'chip';
      c.textContent = q;
      c.onclick = () => { input.value = q; handleSend(); };
      chipWrap.appendChild(c);
    });
    chatArea.appendChild(chipWrap);
  } else {
    const last = messages[messages.length - 1];
    if(last.role === 'bot' && last.checkResolution){
      const wrap = document.createElement('div');
      wrap.className = 'resolve-check';
      wrap.innerHTML = `<div class="resolve-check-text">ご質問は解決しましたか？</div>`;
      const btnWrap = document.createElement('div');
      btnWrap.className = 'chips';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'chip';
      yesBtn.textContent = 'はい';
      yesBtn.onclick = () => handleResolutionAnswer(true);
      const noBtn = document.createElement('button');
      noBtn.className = 'chip';
      noBtn.textContent = 'いいえ';
      noBtn.onclick = () => handleResolutionAnswer(false);
      btnWrap.appendChild(yesBtn);
      btnWrap.appendChild(noBtn);
      wrap.appendChild(btnWrap);
      chatArea.appendChild(wrap);
    }
  }
  chatArea.scrollTop = chatArea.scrollHeight;
}

function handleResolutionAnswer(resolved){
  const last = messages[messages.length - 1];
  if(last) last.checkResolution = false;
  if(resolved){
    messages.push({role:'bot', text:'ご利用ありがとうございました！\n引き続き[Capy-noのショップ](https://capyno.official.ec/)でお買い物をお楽しみください。'});
  } else {
    messages.push({role:'bot', text:'かしこまりました。\n引き続きこちらのチャットでご質問くださいね。'});
  }
  renderMessages();
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typingRow';
  row.innerHTML = `
    <div class="msg-avatar"><img src="assets/character.png" alt="温泉カピバラ" class="avatar-img"></div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping(){
  const row = document.getElementById('typingRow');
  if(row) row.remove();
}

async function callAI(userText){
  const response = await fetch("/.netlify/functions/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: userText })
  });
  if(!response.ok){
    throw new Error("API error: " + response.status);
  }
  const data = await response.json();
  return data.reply || "申し訳ございません、うまく回答を作成できませんでした。";
}

async function handleSend(){
  const text = input.value.trim();
  if(!text || sending) return;
  sending = true;
  sendBtn.disabled = true;
  messages.push({role:'user', text});
  input.value = '';
  input.style.height = 'auto';
  renderMessages();
  showTyping();
  try{
    const reply = await callAI(text);
    hideTyping();
    messages.push({role:'bot', text: reply, checkResolution: true});
  }catch(e){
    hideTyping();
    messages.push({role:'bot', text: '通信エラーが発生しました。少し時間をおいて、もう一度お試しください。'});
  }
  renderMessages();
  sending = false;
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 60) + 'px';
});

/* ---------- init ---------- */
function init(){
  messages = [{role:'bot', text:'こんにちは、温泉カピバラです！\nお客さまが安心してお買い物できるように案内係をしています。\nわからないことは気軽に聞いてくださいね。'}];
  renderMessages();
}
init();
</script>
</body>
</html>
